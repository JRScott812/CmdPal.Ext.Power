name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore CmdPal.Ext.Power.slnx

      - name: Build
        # -m:1 avoids CS2012 when the solution and ProjectReference both compile the extension in parallel
        run: dotnet build CmdPal.Ext.Power.slnx -c Release -p:Platform=x64 -p:GenerateAppxPackageOnBuild=false -m:1 --no-restore

      - name: Test
        run: dotnet test CmdPal.Ext.Power.UnitTests\CmdPal.Ext.Power.UnitTests.csproj -c Release -p:Platform=x64 --no-build --verbosity normal
